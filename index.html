<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Academic Keyboard</title>
    <style>

	@import url('https://fonts.googleapis.com/css2?family=Siemreap&display=swap');

	
        body {
            font-family: "Times New Roman", Times, serif, Siemreap;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #f4f4f9;
        }
		.p {
			font-family: "Times New Roman", Times, serif, Siemreap;
            display: flex;
		
		}

        #display-container {
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 50px;
            font-family: "Times New Roman", Times, serif, Siemreap;
            font-size: 20px;
            padding: 10px;
            box-sizing: border-box;
            border: 2px solid #ccc;
            border-radius: 5px;
        }

        .controls {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        button.action-btn {
            padding: 10px 20px;
            cursor: pointer;
			font-family: Siemreap;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }

        button.clear-btn { background-color: #dc3545; }

        .keyboard {
            width: 100%;
            height: 300px;
			max-width: 800px;
			display: grid;
            grid-template-columns: repeat(30, 1fr);
            gap: 5px;
            background: #333;
            padding: 15px;
            border-radius: 10px;
            user-select: none;
        }

        .key {
            grid-column: span 2;
            height: 50px;
            background: #fff;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.1s;
            border-bottom: 3px solid #bbb;
        }

        .key:active, .key.active {
            background: #ddd;
            transform: translateY(2px);
            border-bottom: none;
        }

        /* Modifier active state */
        .key.toggle-active {
            background: #ffc107;
            border-bottom-color: #ba8b00;
        }

        .key.backspace { grid-column: span 4; }
        .key.tab { grid-column: span 3; }
        .key.caps { grid-column: span 4; }
        .key.enter { grid-column: span 4; }
        .key.shift { grid-column: span 5; }
        .key.space { grid-column: span 12; }
        .key.wide-3 { grid-column: span 3; }
    </style>
</head>
<body>

<div id="display-container">
	<p>ក្តារចុច​ IPA - អ៊ុន ណារុន</p>
    <textarea id="output" placeholder="វាយអត្ថបទ​ IPA..."></textarea>
    <div class="controls">
        <button class="action-btn" onclick="copyText()">ចម្លង</button>
        <button class="action-btn clear-btn" onclick="clearText()">លុប</button>
    </div>
	
</div>

<div class="keyboard" id="keyboard">
    <div class="key" data-code="Backquote">`</div>
    <div class="key" data-code="Digit1">1</div>
    <div class="key" data-code="Digit2">2</div>
    <div class="key" data-code="Digit3">3</div>
    <div class="key" data-code="Digit4">4</div>
    <div class="key" data-code="Digit5">5</div>
    <div class="key" data-code="Digit6">6</div>
    <div class="key" data-code="Digit7">7</div>
    <div class="key" data-code="Digit8">8</div>
    <div class="key" data-code="Digit9">9</div>
    <div class="key" data-code="Digit0">0</div>
    <div class="key" data-code="Minus">-</div>
    <div class="key" data-code="Equal">=</div>
    <div class="key backspace" data-code="Backspace">Bksp</div>

    <div class="key tab" data-code="Tab">Tab</div>
    <div class="key" data-code="KeyQ">q</div>
    <div class="key" data-code="KeyW">w</div>
    <div class="key" data-code="KeyE">e</div>
    <div class="key" data-code="KeyR">r</div>
    <div class="key" data-code="KeyT">t</div>
    <div class="key" data-code="KeyY">y</div>
    <div class="key" data-code="KeyU">u</div>
    <div class="key" data-code="KeyI">i</div>
    <div class="key" data-code="KeyO">o</div>
    <div class="key" data-code="KeyP">p</div>
    <div class="key" data-code="BracketLeft">[</div>
    <div class="key" data-code="BracketRight">]</div>
    <div class="key" data-code="Backslash" style="grid-column: span 3;">\</div>

    <div class="key caps" data-code="CapsLock">Caps</div>
    <div class="key" data-code="KeyA">a</div>
    <div class="key" data-code="KeyS">s</div>
    <div class="key" data-code="KeyD">d</div>
    <div class="key" data-code="KeyF">f</div>
    <div class="key" data-code="KeyG">g</div>
    <div class="key" data-code="KeyH">h</div>
    <div class="key" data-code="KeyJ">j</div>
    <div class="key" data-code="KeyK">k</div>
    <div class="key" data-code="KeyL">l</div>
    <div class="key" data-code="Semicolon">;</div>
    <div class="key" data-code="Quote">'</div>
    <div class="key enter" data-code="Enter">Enter</div>

    <div class="key shift" data-code="ShiftLeft">Shift</div>
    <div class="key" data-code="KeyZ">z</div>
    <div class="key" data-code="KeyX">x</div>
    <div class="key" data-code="KeyC">c</div>
    <div class="key" data-code="KeyV">v</div>
    <div class="key" data-code="KeyB">b</div>
    <div class="key" data-code="KeyN">n</div>
    <div class="key" data-code="KeyM">m</div>
    <div class="key" data-code="Comma">,</div>
    <div class="key" data-code="Period">.</div>
    <div class="key" data-code="Slash">/</div>
    <div class="key shift" data-code="ShiftRight">Shift</div>

    <div class="key wide-3" data-code="ControlLeft">Ctrl</div>
    <div class="key wide-3" data-code="AltLeft">Alt</div>
    <div class="key space" data-code="Space">Space</div>
    <div class="key wide-3" data-code="AltRight">Alt</div>
    <div class="key wide-3" data-code="ControlRight">Ctrl</div>
</div>
<p> របៀបចុច ៖​ Normal/Shift/Alt/Ctrl+Alt/Ctrl+Alt+Shift និង​សូមប្ដូរជា​ពុម្ព​ Time New Roman ក្រោយចម្លង​</p>

<script>
    const output = document.getElementById('output');
    const keys = document.querySelectorAll('.key');

    let currentModifiers = {
        shift: false,
        alt: false,
        ctrl: false
    };

    const mapping = {
        normal: {
            Backquote: '`', Digit1: '1', Digit2: '2', Digit3: '3', Digit4: '4', Digit5: '5', Digit6: '6', Digit7: '7', Digit8: '8', Digit9: '9', Digit0: '0', Minus: '-', Equal: '=',
            KeyQ: 'q', KeyW: 'w', KeyE: 'e', KeyR: 'r', KeyT: 't', KeyY: 'y', KeyU: 'u', KeyI: 'i', KeyO: 'o', KeyP: 'p', BracketLeft: '[', BracketRight: ']', Backslash: '\\',
            KeyA: 'a', KeyS: 's', KeyD: 'd', KeyF: 'f', KeyG: 'g', KeyH: 'h', KeyJ: 'j', KeyK: 'k', KeyL: 'l', Semicolon: ';', Quote: "'",
            KeyZ: 'z', KeyX: 'x', KeyC: 'c', KeyV: 'v', KeyB: 'b', KeyN: 'n', KeyM: 'm', Comma: ',', Period: '.', Slash: '/'
        },
        shift: {
            Backquote: '~', Digit1: '!', Digit2: '@', Digit3: '#', Digit4: '$', Digit5: '%', Digit6: '^', Digit7: '&', Digit8: '*', Digit9: '(', Digit0: ')', Minus: '_', Equal: '+',
            KeyQ: 'ʧ', KeyW: 'ɯ', KeyE: 'ẹ', KeyR: 'ṛ', KeyT: 'ṭ', KeyY: 'ɛ', KeyU: 'ū', KeyI: 'ī', KeyO: 'ọ', KeyP: 'ʃ', BracketLeft: '{', BracketRight: '}', Backslash: '|',
            KeyA: 'ɒ', KeyS: 'ṣ', KeyD: 'ḍ', KeyF: 'ɤ', KeyG: 'ɳ', KeyH: 'ḥ', KeyJ: 'ɲ', KeyK: 'K', KeyL: 'ḷ', Semicolon: ':', Quote: '"',
            KeyZ: 'ʒ', KeyX: 'æ', KeyC: 'ɔ', KeyV: 'ɑ', KeyB: 'β', KeyN: 'ṇ', KeyM: 'ṃ', Comma: '<', Period: '>', Slash: 'Ɂ'
        },
        alt: {
            KeyW: 'ɯ', KeyE: 'ə', KeyR: 'ṝ', KeyT: 'ṭ', KeyY: 'ɜ', KeyU: 'ū', KeyI: 'ɨ', KeyO: 'œ', KeyP: 'θ',
			KeyA: 'ā', KeyS: 'ś', KeyD: 'ð', KeyF: 'ɣ', KeyG: 'ŋ', KeyH: 'ʰ', KeyJ: 'ñ', 
			KeyZ: 'ʤ', KeyX: 'æ', KeyC: 'ɘ', KeyN: 'ṅ', KeyM: 'ɱ'
        },
        ctrlAlt: {  },
        altShift: { },
        ctrlAltShift: { },
        ctrlShift: { }
    };

    function updateVisualLabels() {
        keys.forEach(key => {
            const code = key.getAttribute('data-code');
            if (!code || !mapping.normal[code]) return;

            let char = mapping.normal[code];
            const { shift, alt, ctrl } = currentModifiers;

            if (ctrl && alt && shift) char = mapping.ctrlAltShift[code] || char;
            else if (ctrl && alt) char = mapping.ctrlAlt[code] || char;
            else if (alt && shift) char = mapping.altShift[code] || char;
            else if (ctrl && shift) char = mapping.ctrlShift[code] || char;
            else if (alt) char = mapping.alt[code] || char;
            else if (shift) char = mapping.shift[code] || char;

            key.textContent = char;
        });

        // Highlight modifier keys if active
        document.querySelectorAll('.key').forEach(k => {
            const code = k.getAttribute('data-code');
            k.classList.remove('toggle-active');
            if (code && code.includes('Shift') && currentModifiers.shift) k.classList.add('toggle-active');
            if (code && code.includes('Alt') && currentModifiers.alt) k.classList.add('toggle-active');
            if (code && code.includes('Control') && currentModifiers.ctrl) k.classList.add('toggle-active');
        });
    }

    // Logic for both physical and virtual clicks
    function handleCharacterInput(code) {
        let char = '';
        const { shift, alt, ctrl } = currentModifiers;

        if (ctrl && alt && shift) char = mapping.ctrlAltShift[code];
        else if (ctrl && alt) char = mapping.ctrlAlt[code];
        else if (alt && shift) char = mapping.altShift[code];
        else if (ctrl && shift) char = mapping.ctrlShift[code];
        else if (alt) char = mapping.alt[code];
        else if (shift) char = mapping.shift[code];
        else char = mapping.normal[code];

        if (char) {
            output.setRangeText(char, output.selectionStart, output.selectionEnd, 'end');
            // Reset modifiers after a character is typed (typical for mobile/virtual keyboards)
            // If you want them to stay active, comment out the next 3 lines
            currentModifiers.shift = false;
            currentModifiers.alt = false;
            currentModifiers.ctrl = false;
            updateVisualLabels();
        }
    }

    // Physical Keyboard Listeners
    window.addEventListener('keydown', (e) => {
        const keyEl = document.querySelector(`.key[data-code="${e.code}"]`);
        if (keyEl) keyEl.classList.add('active');
        
        currentModifiers.shift = e.shiftKey;
        currentModifiers.alt = e.altKey;
        currentModifiers.ctrl = e.ctrlKey;
        
        updateVisualLabels();

        if (mapping.normal[e.code]) {
            e.preventDefault();
            handleCharacterInput(e.code);
        }
    });

    window.addEventListener('keyup', (e) => {
        const keyEl = document.querySelector(`.key[data-code="${e.code}"]`);
        if (keyEl) keyEl.classList.remove('active');
        
        currentModifiers.shift = e.shiftKey;
        currentModifiers.alt = e.altKey;
        currentModifiers.ctrl = e.ctrlKey;
        updateVisualLabels();
    });

    // Virtual Click Logic
    keys.forEach(key => {
        key.addEventListener('click', () => {
            const code = key.getAttribute('data-code');
            
            if (code === 'Backspace') {
                output.value = output.value.slice(0, -1);
            } else if (code === 'Enter') {
                output.value += '\n';
            } else if (code === 'Space') {
                output.value += ' ';
            } else if (code && code.includes('Shift')) {
                currentModifiers.shift = !currentModifiers.shift;
            } else if (code && code.includes('Alt')) {
                currentModifiers.alt = !currentModifiers.alt;
            } else if (code && code.includes('Control')) {
                currentModifiers.ctrl = !currentModifiers.ctrl;
            } else if (code && mapping.normal[code]) {
                handleCharacterInput(code);
            }
            
            updateVisualLabels();
            output.focus();
        });
    });

    function copyText() {
        output.select();
        document.execCommand('copy');
        alert("Text copied!");
    }

    function clearText() {
        output.value = '';
    }
</script>

</body>
</html>
